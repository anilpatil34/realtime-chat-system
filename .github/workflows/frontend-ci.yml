# ============================================================
# Frontend CI/CD Pipeline — Lint, Build, Deploy to Vercel
# ============================================================
name: Frontend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Lint
        working-directory: ./frontend
        run: npm run lint || true

      - name: Type check
        working-directory: ./frontend
        run: npx tsc --noEmit || true

      - name: Build
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_URL: https://your-api.onrender.com/api
          NEXT_PUBLIC_WS_URL: wss://your-api.onrender.com
        run: npm run build

  # Vercel auto-deploys from GitHub — no manual trigger needed
  # Set up the Vercel GitHub integration for automatic deployments
