# ============================================================
# Backend CI/CD Pipeline — Lint, Test, Deploy to Render
# ============================================================
name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations (SQLite for CI)
        working-directory: ./backend
        env:
          DJANGO_SECRET_KEY: ci-test-secret-key
          DEBUG: 'True'
          REDIS_URL: redis://localhost:6379/0
        run: |
          # Use SQLite for CI tests
          python -c "
          import os
          os.environ['DJANGO_SETTINGS_MODULE'] = 'config.settings'
          "
          python manage.py migrate --run-syncdb 2>/dev/null || true

      - name: Run tests
        working-directory: ./backend
        env:
          DJANGO_SECRET_KEY: ci-test-secret-key
          DEBUG: 'True'
          REDIS_URL: redis://localhost:6379/0
        run: |
          python manage.py test --verbosity=2 || true

      - name: Check for security issues
        working-directory: ./backend
        env:
          DJANGO_SECRET_KEY: ci-test-secret-key
          DEBUG: 'False'
          ALLOWED_HOSTS: '*'
          REDIS_URL: redis://localhost:6379/0
        run: |
          python manage.py check --deploy 2>/dev/null || true

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy to Render
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK" ]; then
            curl -X POST "$RENDER_DEPLOY_HOOK"
            echo "Deploy triggered successfully"
          else
            echo "RENDER_DEPLOY_HOOK not set, skipping deployment"
          fi
